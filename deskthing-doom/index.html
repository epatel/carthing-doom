<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=800, height=480, initial-scale=1, user-scalable=no">
    <title>DOOM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            width: 800px;
            height: 480px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #loading {
            color: #b00;
            font-family: monospace;
            font-size: 32px;
            text-align: center;
            position: absolute;
        }
        #loading .sub { font-size: 16px; color: #666; margin-top: 10px; }
        #menu-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: none;
            line-height: 40px;
            text-align: center;
        }
        #run-indicator {
            position: absolute;
            bottom: 5px;
            left: 5px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            opacity: 0.5;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">
        LOADING DOOM...
        <div class="sub">Preparing WAD data</div>
    </div>
    <canvas id="doom-canvas"></canvas>
    <button id="menu-btn" onclick="window.doomMenuToggle()">&#9776;</button>
    <div id="run-indicator">RUN</div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
